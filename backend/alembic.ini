# ----------------------------------------------------------------------------
# Alembic 异步迁移配置
#
# pip install alembic
# alembic init -t async alembic
#
# 此文件为 alembic.ini 模板，实际 URL 由 env.py 从 app.core.config 读取
# ----------------------------------------------------------------------------

[alembic]
# 迁移脚本目录
script_location = alembic

# 预处理 SQL 文件（如果使用 offline mode）
# sqlalchemy.url = driver://user:pass@localhost/dbname

# 日志级别
# 可选: CRITICAL, ERROR, WARNING, INFO, DEBUG
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s

# 迁移环境截断限制
truncate_slug_length = 40

# 设定 'transaction_per_migration' 为 True 时，每个迁移在单独的事务中执行
transaction_per_migration = True

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
